<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="./css/Register.css">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

<div class="register-container">
    <div class="logo">
        <img src="./images/Glitter-Logo-1-1024x687-1.png" class="img-logo" alt="">
    </div>

    <h2 class="fw-bold fa-2x">Reset Password</h2>
    <p class="subtitle">Enter your email and your new password</p>

    <form class="register-form">
        <label>Email Address</label>
        <input type="email" name="email" id="email" placeholder="your@email.com" required>
        <div class="alert alert-danger d-none" id="errorAlert1" role="alert"></div>

        <label>New Password</label>
        <input type="password" name="new_password" id="password" placeholder="Enter new password" required>
        <div class="alert alert-danger d-none" id="errorAlert2" role="alert"></div>

        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" id="repPassword" placeholder="Confirm new password" required>
        <div class="alert alert-danger d-none" id="errorAlert3" role="alert"></div>
        <button type="submit" class="register-btn mt-3">Done</button>
    </form>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="./js/ForgetPass.js"></script>
</body>
</html>
