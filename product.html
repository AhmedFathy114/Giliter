    <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function loadProduct() {
        try {
            const res = await fetch(`https://dummyjson.com/products/${id}`);
        const product = await res.json();
        
        const discount = Math.round(product.discountPercentage);
        const originalPrice = (
            product.price / (1 - product.discountPercentage / 100)
        ).toFixed(2);

        document.getElementById("product-details").innerHTML = `
        <div class="row align-items-center">
            
            <div class="col-md-6">
                <img src="${product.thumbnail}" class="w-100 rounded shadow-sm"/>
            </div>
            
            <div class="col-md-6">
                <h2 class="fw-bold">${product.title}</h2>

                <p class="text-muted">${product.description}</p>

                <h4 class="text-danger fw-bold">
                    LE ${product.price}
                    <span class="text-muted text-decoration-line-through fs-6 ms-2">
                    LE ${originalPrice}
                </span>
                </h4>

                <span class="badge bg-dark mb-3">-${discount}%</span>

                <br>

                <button class="btn btn-dark mt-3" id="addBtn">
                Add to Cart
                </button>
            </div>

            </div>
        `;

        // زرار Add to Cart
        document.getElementById("addBtn").addEventListener("click", () => {
            window.addToCart(product);
        });

        } catch (error) {
        document.getElementById("product-details").innerHTML =
            "<p class='text-center'>Error loading product</p>";
        }
    }

    loadProduct();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
