
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="./css/Register.css">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

<div class="register-container">
    <div class="logo"><img src="./images/Glitter-Logo-1-1024x687-1.png" class="img-logo" alt=""></div>
    <h2 class="fw-bold fa-2x">Welcome Back</h2>
    <p class="subtitle">Sign in to your Account</p>

    <form class="register-form" >

        <label>Email Address</label>
        <input type="email" name="email" id="emailField" placeholder="you@example.com" required>

        <label>Password</label>
        <input type="password" name="password" id="passwordField" placeholder="Enter your password" required>

        <div class="d-flex justify-content-between align-items-center mt-3 mb-2" style="width: 100%">
            <div class="d-flex align-items-center" style="gap:8px;">
                <input type="checkbox" id="rememberMe" name="remember"style="margin:0;">
                <label for="rememberMe" style="margin:0; cursor:pointer; white-space: nowrap;">
                    Remember me
                </label>
            </div>

            <a href="./ForgetPass.html" class="forgot" style="text-decoration:none; white-space:nowrap;">Forgot password?
            </a>
        </div>
        <button type="submit" class="register-btn">Login</button>
        <p class="login-text">
            Don't have an account? <a href="./Register.html" style="text-decoration:none;">Sign up</a>
        </p>

    </form>
</div>


<script src="https://cdn.jsdelivr.net/npm/js-cookie@3/dist/js.cookie.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/all.min.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
